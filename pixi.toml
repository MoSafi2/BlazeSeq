[workspace]
name = "blazeseq"
version = "0.3.0"
description = "Primitives for FASTQ parsing and GPU-accelerated sequencing utilities in Mojo."
authors = []
channels = ["conda-forge", "https://conda.modular.com/max-nightly"]
platforms = ["linux-64", "osx-arm64"]
license = "MIT"
preview = ["pixi-build"]

[package]
name = "blazeseq"
version = "0.3.0"

[package.build]
backend = { name = "pixi-build-mojo", version = "0.*", channels = [
    "https://prefix.dev/pixi-build-backends",
    "https://prefix.dev/conda-forge",
] }

[package.host-dependencies]
mojo-compiler = "=0.26.2.0"

# [package.target.linux-64.host-dependencies]
# rapidgzip-mojo = { url = "https://github.com/MoSafi2/rapidgzip_mojo/releases/download/v0.1.1/rapidgzip-mojo-0.1.1-hb0f4dca_0.conda" }

# [package.target.osx-arm64.host-dependencies]
# rapidgzip-mojo = { url = "https://github.com/MoSafi2/rapidgzip_mojo/releases/download/v0.1.1/rapidgzip-mojo-0.1.1-h60d57d3_0.conda" }


[package.build-dependencies]
mojo-compiler = "=0.26.2.0"
rattler-build = "*"

[package.target.linux-64.build-dependencies]
rapidgzip-mojo = { url = "https://github.com/MoSafi2/rapidgzip_mojo/releases/download/v0.1.1/rapidgzip-mojo-0.1.1-hb0f4dca_0.conda" }

[package.target.osx-arm64.build-dependencies]
rapidgzip-mojo = { url = "https://github.com/MoSafi2/rapidgzip_mojo/releases/download/v0.1.1/rapidgzip-mojo-0.1.1-h60d57d3_0.conda" }

[dependencies]
mojo = ">=0.26.2.0.dev2026031005,<0.27"

[target.linux-64.dependencies]
rapidgzip-mojo = { url = "https://github.com/MoSafi2/rapidgzip_mojo/releases/download/v0.1.1/rapidgzip-mojo-0.1.1-hb0f4dca_0.conda" }

[target.osx-arm64.dependencies]
rapidgzip-mojo = { url = "https://github.com/MoSafi2/rapidgzip_mojo/releases/download/v0.1.1/rapidgzip-mojo-0.1.1-h60d57d3_0.conda" }


[tasks]
build = "mojo package blazeseq -o BlazeSeq.mojopkg"
test = { cmd = "sh -c 'find ./tests -name \"test_*.mojo\" | xargs -I % pixi run mojo run -I . -D ASSERT=all %'" }
docs = "modo build && cd docs/site && npm install && node scripts/add-frontmatter.mjs && npm run build"
docs-serve = "modo build && cd docs/site && npm install && node scripts/add-frontmatter.mjs && npm run dev"
rbuild = "pixi build"
rtest = { cmd = "rattler-build test --package-file .pixi/build/linux-64/blazeseq-0.3.0-0.conda", depends-on = [
    "rbuild",
] }
[pypi-dependencies]
pymodo = ">=0.11.12, <0.12"

[feature.docs.dependencies]
nodejs = ">=25.7.0,<25.8"

[feature.benchmark.dependencies]
hyperfine = ">=1.20.0,<2"
rust = ">=1.94.0,<1.95"
python = ">=3.14.3,<3.15"
matplotlib = ">=3.10.8,<4"
numpy = ">=2.4.2,<3"

[feature.benchmark.tasks]
benchmark-plain = "bash -c './benchmark/fastq-parser/run_benchmarks.sh'"
benchmark-fastq-batch-vs-paraseq = "bash -c './benchmark/fastq-parser/run_benchmarks_batch_vs_paraseq.sh'"
benchmark-gzip = "bash -c './benchmark/fastq-parser/run_benchmarks_gzip.sh'"
benchmark-gzip-single = "bash -c 'GZIP_BENCH_PARALLELISM=1 ./benchmark/fastq-parser/run_benchmarks_gzip.sh'"
benchmark-throughput = "bash -c './benchmark/throughput/run_throughput_benchmarks.sh'"
benchmark-throughput-validation = "bash -c './benchmark/throughput/run_throughput_validation_benchmarks.sh'"
benchmark-throughput-memory = "bash benchmark/throughput/run_throughput_memory_benchmarks.sh"
benchmark-fasta = "bash -c './benchmark/fasta-parser/run_benchmarks.sh'"
benchmark-plot = "bash -c 'python benchmark/scripts/plot_benchmark_results.py --repo-root . --assets-dir assets'"

[environments]
docs = ["default", "docs"]
benchmark = ["default", "benchmark"]
